<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бухгалтерское бюро №1</title>
    <link rel="stylesheet" href="./css/pages/book.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Onest:wght@400;700&family=Unbounded:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="body">
    <header id="header" class="site-header"></header>

    <main class="section-main">
      <section class="book">
        <div class="book__media">
          <picture class="book__cover">
            <source srcset="./images/book/book.webp" type="image/webp" />
            <img
              src="./images/book/book.png"
              alt="Обложка книги"
              class="book__cover-img"
              loading="lazy"
            />
          </picture>
        </div>

        <div class="book__content">
          <h1 class="title-page book__title-main">КНИГА</h1>

          <picture class="book__title-picture">
            <source srcset="./images/book/title.webp" type="image/webp" />
            <img
              src="./images/book/title.png"
              alt="Название книги"
              class="book__title-img"
              loading="lazy"
            />
          </picture>

          <h2 class="title-page book__title-description">
            В нашей команде работают не только талантливые бухгалтеры. В наших
            рядах есть настоящая писательница
          </h2>
        </div>
      </section>
    </main>

    <footer id="footer" class="footer"></footer>

    <script type="module" src="./js/loadPart.js" defer></script>
    <script src="./js/smoothAppearance.js" defer></script>
  </body>
</html>
